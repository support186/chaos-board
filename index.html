<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Office Physics Simulator</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --wood: #5d3a1a; --desk: #3d2b1f; --cork: #dcb07c;
            --pin: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Pushpin.svg/64px-Pushpin.svg.png');
        }
        body { 
            margin: 0; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: #2c3e50; display: flex; flex-direction: column; touch-action: none; user-select: none;
        }

        /* --- BACKGROUND OFFICE & TARGETS --- */
        #background-office {
            height: 20vh; background: #34495e; position: relative;
            border-bottom: 8px solid #1a252f; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 40px;
        }
        
        #water-cooler { width: 50px; height: 120px; position: relative; }
        #jug { width: 46px; height: 60px; background: rgba(52,152,219,0.6); border-radius: 10px 10px 0 0; border: 2px solid rgba(255,255,255,0.4); }
        #cooler-base { width: 50px; height: 60px; background: #ecf0f1; border-radius: 2px; position: relative; }
        .tap { position: absolute; top: 10px; left: 20px; width: 10px; height: 10px; background: #333; border-radius: 50%; }
        #puddle {
            position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 0px; height: 10px;
            background: rgba(52,152,219,0.7); border-radius: 50%; opacity: 0; transition: width 0.5s, opacity 0.5s;
        }

        #bin-container { position: relative; margin-left: 20px; margin-bottom: 10px; }
        #bin { 
            width: 60px; height: 70px; background: #7f8c8d; border-radius: 5px 5px 15px 15px; 
            position: relative; box-shadow: inset -5px 0 10px rgba(0,0,0,0.2);
        }
        #bin::before { 
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; height: 15px;
            background: #fdfdfd; border-radius: 5px; border: 1px solid #ddd;
            box-shadow: 0 2px 3px rgba(0,0,0,0.1), inset 0 -2px 5px rgba(0,0,0,0.05);
        }
        
        .score-popup {
            position: absolute; top: -20px; left: 5px; color: #2ecc71; font-weight: bold; font-size: 24px;
            opacity: 0; pointer-events: none; text-shadow: 1px 1px 2px #000; z-index: 100;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }

        #coworker-desk {
            width: 130px; height: 90px; background: #2c3e50; border: 4px solid #1a252f;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; color: white;
            border-radius: 5px 5px 0 0; position: relative; padding-bottom: 5px; margin-right: 20px;
        }
        #bob { font-size: 40px; line-height: 1; position: relative; }
        #bob-headphones { position: absolute; top: -2px; left: 10px; font-size: 26px; transform: rotate(-10deg); }
        
        #coworker-speech {
            position: absolute; top: 0px; left: -160px; width: 140px; background: white; color: black;
            padding: 8px; border-radius: 8px; font-size: 12px; font-weight: bold; text-align: center;
            display: none; border: 2px solid #333; z-index: 50;
        }
        #coworker-speech::before {
            content: ''; position: absolute; top: 15px; right: -12px;
            border-width: 8px 0 8px 10px; border-style: solid; border-color: transparent transparent transparent #333;
        }
        #coworker-speech::after {
            content: ''; position: absolute; top: 17px; right: -8px;
            border-width: 6px 0 6px 8px; border-style: solid; border-color: transparent transparent transparent white;
        }

        /* --- THE BOARD --- */
        #wall {
            height: 60vh; background: #7f8c8d; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 -20px 30px rgba(0,0,0,0.4); z-index: 10;
        }
        #frame { width: 85%; height: 90%; background: var(--wood); padding: 15px; border-radius: 8px; position: relative; }
        
        #board-title {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: #d4af37;
            padding: 5px 20px; border-radius: 3px; font-family: serif; font-weight: bold; font-size: 16px;
            box-shadow: 3px 3px 5px rgba(0,0,0,0.4); z-index: 15; cursor: pointer; transition: transform 0.1s;
        }
        #board-title:active { transform: translateX(-50%) scale(0.95); }

        #corkboard {
            width: 100%; height: 100%; background-color: var(--cork); background-image: url('https://www.transparenttextures.com/patterns/cork-board.png');
            box-shadow: inset 5px 5px 20px rgba(0,0,0,0.5); position: relative; overflow: visible; 
        }
        #pads-container { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
        .pad { width: 45px; height: 45px; cursor: pointer; border-radius: 2px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: rgba(0,0,0,0.3); }

        /* --- FOREGROUND DESK --- */
        #desk { height: 20vh; background: var(--desk); position: relative; z-index: 20; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        
        #cup {
            width: 110px; height: 80px; background: #bdc3c7; position: absolute; top: -30px; left: 10%;
            border-radius: 10px 10px 30px 30px; display: flex; justify-content: center; gap: 8px; padding-top: 15px;
        }
        .sharpie {
            width: 14px; height: 100px; cursor: pointer; margin-top: -40px; 
            transition: transform 0.2s; background: #95a5a6; border-radius: 8px 8px 0 0; position: relative; border: 1px solid #7f8c8d;
        }
        .sharpie::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 35px; background: var(--marker-color); border-radius: 7px 7px 0 0; border-bottom: 3px solid #333; }
        .sharpie.active { transform: translateY(-25px); }

        #coffee-container { position: absolute; top: -20px; right: 10%; width: 60px; height: 60px; }
        #coffee { width: 50px; height: 60px; background: #ecf0f1; border-radius: 5px 5px 15px 15px; box-shadow: 8px 8px 15px rgba(0,0,0,0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; z-index: 5; }
        #coffee::after { content: ''; position: absolute; right: -12px; top: 15px; width: 15px; height: 25px; border: 5px solid #ecf0f1; border-radius: 50%; z-index: -1; }
        #coffee-spill { position: absolute; top: 40px; right: 0; width: 0; height: 20px; background: #4e342e; border-radius: 50%; opacity: 0; transition: width 0.5s, opacity 0.5s; pointer-events: none; }

        /* Slingshot Paper Ball */
        #scrunched-paper {
            position: fixed; left: calc(50% - 20px); bottom: 70px; width: 40px; height: 40px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M20,2 C10,4 5,12 8,22 C10,32 18,38 28,35 C38,32 40,22 35,12 C32,5 28,1 20,2 Z" fill="%23ecf0f1" stroke="%23bdc3c7" stroke-width="1"/><path d="M12,10 Q18,15 15,25 Q20,20 28,18 Q25,28 32,25 M8,18 Q15,22 25,12" fill="none" stroke="%2395a5a6" stroke-width="1.5"/></svg>');
            background-size: contain; background-repeat: no-repeat;
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.4)); cursor: grab; z-index: 1000; transition: opacity 0.3s;
        }
        #scrunched-paper:active { cursor: grabbing; }
        #trajectory { position: fixed; border-top: 2px dashed rgba(255,255,255,0.8); transform-origin: 0 0; display: none; z-index: 999; pointer-events: none; }

        /* --- SMART NOTES --- */
        .note {
            position: absolute; width: 220px; height: 230px; box-shadow: 5px 10px 15px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; border-radius: 2px; transform-origin: top left;
            transform: scale(0.2); transition: transform 0.2s, box-shadow 0.2s; z-index: 10; cursor: grab;
        }
        .note:active { cursor: grabbing; }
        .note:hover { transform: scale(1); z-index: 90; box-shadow: 10px 20px 30px rgba(0,0,0,0.5); }
        .note.editing { transform: scale(1); z-index: 100; cursor: default; }

        .note-header { height: 25px; display: flex; justify-content: center; background: rgba(0,0,0,0.03); border-bottom: 1px solid rgba(0,0,0,0.05); position: relative; }
        .note-header::before { content: ''; position: absolute; top: -5px; width: 25px; height: 25px; background-image: var(--pin); background-size: contain; background-repeat: no-repeat; }
        .note-body { flex: 1; position: relative; background: inherit; }
        .note-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; border: none; padding: 10px; box-sizing: border-box;
            font-family: 'Comic Sans MS', cursive; font-size: 16px; outline: none; resize: none; z-index: 1; pointer-events: none;
        }
        .note-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        .note-controls { height: 35px; display: none; justify-content: space-evenly; align-items: center; background: rgba(0,0,0,0.08); border-top: 1px solid rgba(0,0,0,0.05); }
        .note.editing .note-controls { display: flex; }
        .note.editing .note-text { pointer-events: auto; } 
        
        .mode-btn { font-size: 13px; padding: 4px 10px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-weight: bold; opacity: 0.7; }
        .mode-btn.active { background: #3498db; color: white; border-color: #2980b9; opacity: 1; }
    </style>
</head>
<body>

    <div id="background-office">
        <div id="water-cooler" class="target" data-hit="water">
            <div id="jug"></div>
            <div id="cooler-base"><div class="tap"></div></div>
            <div id="puddle"></div>
        </div>
        
        <div id="bin-container" class="target" data-hit="bin">
            <div id="bin"></div>
            <div id="score-anim" class="score-popup">+20</div>
        </div>
        
        <div id="coworker-desk" class="target" data-hit="bob">
            <div id="coworker-speech"></div>
            <div id="bob">👨‍💻<span id="bob-headphones">🎧</span></div>
            <span style="font-size: 12px; font-weight: bold; margin-top: 5px;">Bob</span>
        </div>
    </div>

    <div id="wall">
        <div id="frame">
            <div id="board-title" onclick="adminWipe()">COMMUNITY CHAOS BOARD</div>
            <div id="corkboard">
                <div id="pads-container">
                    <div class="pad" style="background: #feff9c" onclick="createNoteInCloud('#feff9c')">+</div>
                    <div class="pad" style="background: #ffb6c1" onclick="createNoteInCloud('#ffb6c1')">+</div>
                    <div class="pad" style="background: #a0e6ff" onclick="createNoteInCloud('#a0e6ff')">+</div>
                    <div class="pad" style="background: #b9ffb0" onclick="createNoteInCloud('#b9ffb0')">+</div>
                </div>
            </div>
        </div>
    </div>

    <div id="desk">
        <div id="cup">
            <div class="sharpie active" style="--marker-color: #2c3e50;" onclick="setSharpie(this, '#2c3e50')"></div>
            <div class="sharpie" style="--marker-color: #c0392b;" onclick="setSharpie(this, '#c0392b')"></div>
            <div class="sharpie" style="--marker-color: #2980b9;" onclick="setSharpie(this, '#2980b9')"></div>
            <div class="sharpie" style="--marker-color: #27ae60;" onclick="setSharpie(this, '#27ae60')"></div>
        </div>
        
        <div id="coffee-container" class="target" data-hit="coffee">
            <div id="coffee-spill"></div>
            <div id="coffee"></div>
        </div>
    </div>

    <div id="trajectory"></div>
    <div id="scrunched-paper"></div>

    <script>
        // --- 1. FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyDDmGYRgwUgV4C02QIqYkQMZFqVr8Rhmns",
            authDomain: "chaos-board-a4ff7.firebaseapp.com",
            databaseURL: "https://chaos-board-a4ff7-default-rtdb.firebaseio.com",
            projectId: "chaos-board-a4ff7",
            storageBucket: "chaos-board-a4ff7.firebasestorage.app",
            messagingSenderId: "1001140562423",
            appId: "1:1001140562423:web:d02d931d57ead5c9b966f2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('notes');

        // --- ADMIN BOARD WIPE ---
        function adminWipe() {
            const pwd = prompt("Enter Admin Password:");
            if (pwd === "chaos") {
                db.remove()
                    .then(() => alert("Board successfully wiped!"))
                    .catch((err) => alert("Error wiping board: " + err.message));
            } else if (pwd !== null) {
                alert("Incorrect password. Nice try.");
            }
        }

        let currentInk = '#2c3e50';
        const board = document.getElementById('corkboard');

        function setSharpie(element, color) {
            document.querySelectorAll('.sharpie').forEach(s => s.classList.remove('active'));
            element.classList.add('active'); currentInk = color;
        }

        board.addEventListener('mousedown', (e) => {
            if (e.target === board) {
                document.querySelectorAll('.note').forEach(n => { n.classList.remove('editing'); n.querySelector('.note-canvas').style.pointerEvents = 'none'; });
            }
        });

        // --- 2. PERCENTAGE-BASED CLOUD SYNC LOGIC ---
        function createNoteInCloud(bgColor) {
            db.push({
                bgColor: bgColor,
                left: 15, top: 10, 
                text: '', color: currentInk,
                drawing: '' 
            });
        }

        db.on('child_added', (snapshot) => { renderNoteFromDB(snapshot.key, snapshot.val()); });

        db.on('child_removed', (snapshot) => {
            const noteToRemove = document.getElementById(snapshot.key);
            if (noteToRemove) noteToRemove.remove();
        });

        db.on('child_changed', (snapshot) => {
            const data = snapshot.val();
            const note = document.getElementById(snapshot.key);
            if (!note) return;
            
            if (note.dataset.isDragging !== 'true') {
                note.style.left = data.left + '%';
                note.style.top = data.top + '%';
            }
            
            if (!note.classList.contains('editing')) {
                const textArea = note.querySelector('.note-text');
                // GHOST FIX: Fallback to empty string if data.text is undefined
                const newText = data.text || ''; 
                if (textArea.value !== newText) textArea.value = newText;
                textArea.style.color = data.color || '#000';
            }

            if (data.drawing) {
                const canvas = note.querySelector('.note-canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = data.drawing;
            }
        });

        function renderNoteFromDB(id, data) {
            const note = document.createElement('div');
            note.className = 'note'; 
            note.id = id; 
            // GHOST FIX: Ensure default colors and text so "undefined" never shows up
            note.style.backgroundColor = data.bgColor || '#feff9c';
            note.style.left = (data.left || 15) + '%'; 
            note.style.top = (data.top || 10) + '%';
            note.dataset.isDragging = 'false';

            note.innerHTML = `
                <div class="note-header"></div>
                <div class="note-body">
                    <textarea class="note-text"></textarea>
                    <canvas class="note-canvas"></canvas>
                </div>
                <div class="note-controls">
                    <button class="mode-btn active" onclick="switchMode(this, 'type')">Type</button>
                    <button class="mode-btn" onclick="switchMode(this, 'draw')">Draw</button>
                    <button class="mode-btn" style="background:#e74c3c; color:white; border-color:#c0392b" onclick="closeNote(this)">Done</button>
                </div>
            `;

            board.appendChild(note);
            const canvas = note.querySelector('.note-canvas');
            const body = note.querySelector('.note-body');
            const textArea = note.querySelector('.note-text');
            
            textArea.value = data.text || '';
            textArea.style.color = data.color || '#000';

            if (data.drawing) {
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = data.drawing;
            }

            note.addEventListener('dblclick', () => {
                document.querySelectorAll('.note').forEach(n => n.classList.remove('editing'));
                note.classList.add('editing');
                switchMode(note.querySelector('.mode-btn'), 'type'); 
            });

            textArea.addEventListener('input', () => { 
                textArea.style.color = currentInk;
                db.child(id).update({ text: textArea.value, color: currentInk });
            });
            
            setTimeout(() => { canvas.width = body.offsetWidth; canvas.height = body.offsetHeight; initDrawing(canvas, id); }, 10);
            initDragging(note, id);
        }

        function closeNote(btn) {
            const note = btn.closest('.note');
            note.classList.remove('editing');
            note.querySelector('.note-canvas').style.pointerEvents = 'none';
        }

        function switchMode(btn, mode) {
            const note = btn.closest('.note');
            const canvas = note.querySelector('.note-canvas');
            const textArea = note.querySelector('.note-text');
            note.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (mode === 'draw') { canvas.style.pointerEvents = 'auto'; textArea.blur(); } 
            else { canvas.style.pointerEvents = 'none'; textArea.focus(); }
        }

        function initDrawing(canvas, id) {
            const ctx = canvas.getContext('2d');
            let drawing = false;
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top };
            };
            const start = (e) => { drawing = true; ctx.beginPath(); draw(e); };
            const stop = () => { 
                drawing = false; 
                db.child(id).update({ drawing: canvas.toDataURL() });
            };
            const draw = (e) => {
                if (!drawing) return; const p = getPos(e);
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = currentInk;
                ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.moveTo(p.x, p.y);
            };
            canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
            window.addEventListener('mousemove', draw); window.addEventListener('touchmove', (e) => { if(drawing) e.preventDefault(); draw(e); });
            window.addEventListener('mouseup', stop); window.addEventListener('touchend', stop);
        }

        function initDragging(note, id) {
            let dragging = false;
            let startMouseX, startMouseY, startNoteLeftPct, startNoteTopPct;

            const start = (e) => {
                if (note.classList.contains('editing') && !e.target.classList.contains('note-header')) return; 
                dragging = true; note.dataset.isDragging = 'true';
                
                startMouseX = e.touches ? e.touches[0].clientX : e.clientX; 
                startMouseY = e.touches ? e.touches[0].clientY : e.clientY;
                
                startNoteLeftPct = parseFloat(note.style.left) || 0; 
                startNoteTopPct = parseFloat(note.style.top) || 0;
                
                note.style.zIndex = '150';
            };

            const move = (e) => {
                if (!dragging) return;
                
                const currentX = e.touches ? e.touches[0].clientX : e.clientX;
                const currentY = e.touches ? e.touches[0].clientY : e.clientY;
                const dx = currentX - startMouseX;
                const dy = currentY - startMouseY;
                
                const boardRect = board.getBoundingClientRect();
                
                const dxPct = (dx / boardRect.width) * 100;
                const dyPct = (dy / boardRect.height) * 100;
                
                let newLeft = startNoteLeftPct + dxPct;
                let newTop = startNoteTopPct + dyPct;

                // --- INVISIBLE FENCE: Clamp coordinates so notes can't go off-screen ---
                // Calculates the max percentage space the note can take without overflowing
                const maxLeft = 100 - ((note.offsetWidth / boardRect.width) * 100);
                const maxTop = 100 - ((note.offsetHeight / boardRect.height) * 100);

                if (newLeft < 0) newLeft = 0;
                if (newLeft > maxLeft) newLeft = maxLeft;
                if (newTop < 0) newTop = 0;
                if (newTop > maxTop) newTop = maxTop;
                
                note.style.left = newLeft + '%'; 
                note.style.top = newTop + '%';
            };

            const end = () => { 
                if(!dragging) return;
                dragging = false; note.dataset.isDragging = 'false';
                if(!note.classList.contains('editing')) note.style.zIndex = '10'; 
                
                db.child(id).update({ 
                    left: parseFloat(note.style.left), 
                    top: parseFloat(note.style.top) 
                });
            };
            
            note.addEventListener('mousedown', start); note.addEventListener('touchstart', start);
            window.addEventListener('mousemove', move); window.addEventListener('touchmove', move);
            window.addEventListener('mouseup', end); window.addEventListener('touchend', end);
        }

        // --- 3. IMPROVED PHYSICS ENGINE (MOBILE & PC) ---
        const paper = document.getElementById('scrunched-paper');
        const traj = document.getElementById('trajectory');
        let isAiming = false, inFlight = false;
        let startX, startY, paperX, paperY, vX, vY;
        let lastDx = 0, lastDy = 0; 
        
        const resetPaper = () => {
            paper.style.opacity = '1';
            paper.style.left = `calc(50% - 20px)`;
            paper.style.bottom = `70px`; 
            paper.style.top = 'auto'; 
            paper.style.transform = 'none';
            inFlight = false;
            document.querySelectorAll('.target').forEach(t => t.dataset.hitRegistered = 'false');
        };

        const getX = (e) => e.touches ? e.touches[0].clientX : e.clientX;
        const getY = (e) => e.touches ? e.touches[0].clientY : e.clientY;

        const aimStart = (e) => {
            if (inFlight) return;
            isAiming = true;
            startX = getX(e); 
            startY = getY(e);
            lastDx = 0; lastDy = 0;
            traj.style.display = 'block';
        };

        const aimMove = (e) => {
            if (!isAiming) return;
            if (e.cancelable) e.preventDefault(); 
            
            lastDx = getX(e) - startX;
            lastDy = getY(e) - startY;
            
            const dist = Math.sqrt(lastDx*lastDx + lastDy*lastDy);
            const maxPull = 60; 
            const pullX = dist > maxPull ? (lastDx/dist)*maxPull : lastDx;
            const pullY = dist > maxPull ? (lastDy/dist)*maxPull : lastDy;

            paper.style.transform = `translate(${pullX}px, ${pullY}px)`;
            traj.style.left = (startX + pullX) + 'px';
            traj.style.top = (startY + pullY) + 'px';
            traj.style.width = (dist * 1.5) + 'px';
            traj.style.transform = `rotate(${Math.atan2(-pullY, -pullX)}rad)`;
        };

        const aimEnd = (e) => {
            if (!isAiming) return;
            isAiming = false; traj.style.display = 'none';
            
            if (Math.abs(lastDx) < 10 && Math.abs(lastDy) < 10) { resetPaper(); return; } 
            
            vX = -lastDx * 0.35; 
            vY = -lastDy * 0.35; 
            
            const rect = paper.getBoundingClientRect();
            paperX = rect.left; paperY = rect.top;
            
            paper.style.left = paperX + 'px'; paper.style.top = paperY + 'px';
            paper.style.bottom = 'auto'; paper.style.transform = 'none';
            
            inFlight = true;
            requestAnimationFrame(flightLoop);
        };

        paper.addEventListener('mousedown', aimStart);
        paper.addEventListener('touchstart', aimStart, { passive: false });
        window.addEventListener('mousemove', aimMove);
        window.addEventListener('touchmove', aimMove, { passive: false });
        window.addEventListener('mouseup', aimEnd);
        window.addEventListener('touchend', aimEnd);

        function flightLoop() {
            if (!inFlight) return;
            paperX += vX; paperY += vY; vY += 0.4; 
            
            paper.style.left = paperX + 'px'; paper.style.top = paperY + 'px';
            paper.style.transform = `rotate(${paperX * 2}deg) scale(0.6)`; 

            checkCollisions();

            if (inFlight) {
                if (paperY > window.innerHeight + 50) { resetPaper(); } 
                else { requestAnimationFrame(flightLoop); }
            }
        }

        function checkCollisions() {
            const paperRect = paper.getBoundingClientRect();
            const targets = document.querySelectorAll('.target');

            targets.forEach(target => {
                if (target.dataset.hitRegistered === 'true') return;
                const tRect = target.getBoundingClientRect();
                
                if (paperRect.left < tRect.right && paperRect.right > tRect.left &&
                    paperRect.top < tRect.bottom && paperRect.bottom > tRect.top) {
                    
                    target.dataset.hitRegistered = 'true';
                    triggerEvent(target.dataset.hit, tRect);
                }
            });
        }

        function triggerEvent(type, tRect) {
            if (type === 'bin') {
                inFlight = false; 
                paper.style.left = (tRect.left + 10) + 'px';
                paper.style.top = (tRect.top + 10) + 'px';
                paper.style.transform = 'scale(0.3)';
                paper.style.opacity = '0'; 
                
                const anim = document.getElementById('score-anim');
                anim.style.animation = 'none'; void anim.offsetWidth; 
                anim.style.animation = 'floatUp 1.5s forwards';
                
                setTimeout(resetPaper, 1500); 
            }
            else if (type === 'coffee') {
                document.getElementById('coffee').style.transform = 'rotate(80deg) translate(20px, 30px)';
                document.getElementById('coffee-spill').style.opacity = '1'; 
                document.getElementById('coffee-spill').style.width = '100px';
                setTimeout(() => {
                    document.getElementById('coffee').style.transform = 'none';
                    document.getElementById('coffee-spill').style.opacity = '0';
                    setTimeout(() => document.getElementById('coffee-spill').style.width = '0px', 500);
                }, 4000);
            } 
            else if (type === 'water') {
                const puddle = document.getElementById('puddle');
                puddle.style.opacity = '1'; puddle.style.width = '70px';
                setTimeout(() => { puddle.style.opacity = '0'; setTimeout(() => puddle.style.width = '0px', 500); }, 3000);
            } 
            else if (type === 'bob') {
                const speech = document.getElementById('coworker-speech');
                const lines = [
                    "Watch it!", "HR will hear about this.", "Hostile work environment!", "Missed me.",
                    "Per my last email...", "Let's take this offline.", "I'm literally on a Zoom right now.",
                    "Can we circle back?", "Ping me on Slack.", "I have a hard stop at 4.",
                    "This could have been an email.", "Who touched my stapler?", "I need more coffee.",
                    "Synergy!", "We need to align on this."
                ];
                speech.innerText = lines[Math.floor(Math.random() * lines.length)];
                speech.style.display = 'block';
                setTimeout(() => speech.style.display = 'none', 3000);
            } 
        }
    </script>
</body>
</html>
